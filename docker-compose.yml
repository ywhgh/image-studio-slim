# Single-service deployment for 4-core / 4 GB server.
# Memory ceiling is far below available RAM, so the host stays responsive even
# while the browser uploads reference images and the upstream API streams back.

services:
  image-studio:
    build:
      context: .
      dockerfile: Dockerfile
    image: image-studio-slim:latest
    container_name: image-studio
    restart: unless-stopped
    # External access: map host:8090 -> container:8090. Change the LEFT side
    # if 8090 on the host is already taken (e.g. "8091:8090").
    ports:
      - "8090:8090"
    environment:
      HOST: 0.0.0.0
      PORT: 8090
      # Increase if your upstream is slow (e.g. large gpt-image-1 batches).
      UPSTREAM_TIMEOUT: 240s
      DOWNLOAD_TIMEOUT: 60s
      # Set to "true" only when your upstream is on the same private LAN as
      # the server. Default rejects loopback / RFC1918 / link-local hosts.
      ALLOW_PRIVATE_UPSTREAM: "false"
      TZ: Asia/Shanghai
    # Keep the slim binary boxed in: 4-core/4G servers do not have headroom
    # to spare if a runaway request leaks memory.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -T 5 -O /dev/null http://127.0.0.1:8090/api/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
